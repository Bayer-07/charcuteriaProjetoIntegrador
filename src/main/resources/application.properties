spring.application.name=demo

spring.datasource.url=jdbc:postgresql://localhost:5433/chacuteria_db
spring.datasource.username=admin
spring.datasource.password=password123
spring.datasource.driver-class-name=org.postgresql.Driver

logging.level.root=INFO
logging.level.com.example.chacuteria=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.config.import=optional:file:.env[.properties]
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.jpa.open-in-view=false

spring.web.locale=pt_BR
spring-web.locale-resolver=fixed

server.error.whitelabel.enabled=false

# O Spring substitui automaticamente pelo valor do .env se a biblioteca dotenv estiver ativa,
# ou pelas variáveis de ambiente do sistema operacional/Docker.
pix.key=${PIX_KEY:qualquercoisa}
pix.merchant.name=${PIX_MERCHANT_NAME:qualquercoisa}
pix.merchant.city=${PIX_MERCHANT_CITY:qualquercoisa}
# se a gente puder usar JPA de ORM é so habilitar isso aq
