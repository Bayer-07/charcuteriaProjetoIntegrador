<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Endereços</title>
    <link rel="stylesheet" th:href="@{/css/address.css}" href="/css/address.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
</head>
<body class="addresses-page">
    <div class="addresses-container">
        <div class="addresses-header">
            <div>
                <h1>Meus Endereços</h1>
                <p>Veja, revise e gerencie os endereços cadastrados na sua conta.</p>
            </div>
            <a th:href="@{/addresses/new}" class="btn-new-address">+ Novo Endereço</a>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <div th:if="${#lists.isEmpty(addresses)}" class="no-addresses">
            <p>Você não possui endereços cadastrados.</p>
            <a th:href="@{/addresses/new}" class="btn-new-address">Cadastrar Primeiro Endereço</a>
        </div>

        <div th:unless="${#lists.isEmpty(addresses)}" class="addresses-list">
            <div th:each="address : ${addresses}" class="address-card">
                <h3 th:text="${address.street + ', ' + address.number}">
                    Rua Principal, 123
                </h3>

                <div class="address-info">
                    <strong>Complemento:</strong> <span th:text="${address.complement ?: 'N/A'}">-</span>
                </div>

                <div class="address-info">
                    <strong>Bairro:</strong> <span th:text="${address.neighborhood}">Centro</span>
                </div>

                <div class="address-info">
                    <strong>Cidade:</strong> <span th:text="${address.city}">São Paulo</span>
                </div>

                <div class="address-info">
                    <strong>Estado:</strong> <span th:text="${address.state}">SP</span>
                </div>

                <div class="address-info">
                    <strong>CEP:</strong> <span th:text="${address.zipCode}">01234-567</span>
                    <span th:if="${address.isDefault}" class="is-default-badge">Padrão</span>
                </div>

                <div class="address-actions">
                    <a th:href="@{/addresses/{id}/edit(id=${address.id})}" class="btn-edit">Editar</a>
                    <form th:action="@{/addresses/{id}/delete(id=${address.id})}" method="POST" style="flex: 1;">
                        <button type="submit" class="btn-delete" style="width: 100%; padding: 8px 12px;" onclick="return confirm('Tem certeza que deseja deletar este endereço?')">
                            Deletar
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
