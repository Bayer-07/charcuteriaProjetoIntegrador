<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${addressId != null} ? 'Editar Endereço' : 'Novo Endereço'">Novo Endereço</title>
    <link rel="stylesheet" th:href="@{/css/address.css}" href="/css/address.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
</head>

<body class="address-form-page">
    <div class="form-container">
        <div class="form-shell">
            <div class="form-header">
                <h1 th:text="${addressId != null} ? 'Editar Endereço' : 'Novo Endereço'">Novo Endereço</h1>
                <p>Preencha os dados abaixo para salvar o endereço na sua conta.</p>
            </div>

            <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

            <form th:if="${addressId == null}" th:action="@{/addresses}" method="POST" th:object="${addressDto}">
                <div class="form-group">
                    <label for="street">Rua/Avenida *</label>
                    <input type="text" id="street" name="street" th:field="*{street}" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="number">Número *</label>
                        <input type="text" id="number" name="number" th:field="*{number}" required>
                    </div>
                    <div class="form-group">
                        <label for="complement">Complemento</label>
                        <input type="text" id="complement" name="complement" th:field="*{complement}"
                            placeholder="Apt, Casa, Sala...">
                    </div>
                </div>

                <div class="form-group">
                    <label for="neighborhood">Bairro *</label>
                    <input type="text" id="neighborhood" name="neighborhood" th:field="*{neighborhood}" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="city">Cidade *</label>
                        <input type="text" id="city" name="city" th:field="*{city}" required>
                    </div>
                    <div class="form-group">
                        <label for="state">Estado *</label>
                        <input type="text" id="state" name="state" th:field="*{state}" placeholder="SP" maxlength="2"
                            required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="zipCode">CEP *</label>
                    <input type="text" id="zipCode" name="zipCode" th:field="*{zipCode}" placeholder="12345-678"
                        required>
                    <span class="form-hint">Formato: 12345-678</span>
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" th:field="*{isDefault}">
                        Definir como endereço padrão
                    </label>
                    <span class="form-hint">Se marcado, este endereço será o padrão da conta.</span>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">Salvar Endereço</button>
                    <a th:href="@{/public/dashboard}" class="btn-cancel">Cancelar</a>
                </div>
            </form>

            <form th:unless="${addressId == null}" th:action="@{/addresses/{id}/edit(id=${addressId})}" method="POST"
                th:object="${addressDto}">
                <div class="form-group">
                    <label for="street">Rua/Avenida *</label>
                    <input type="text" id="street" name="street" th:field="*{street}" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="number">Número *</label>
                        <input type="text" id="number" name="number" th:field="*{number}" required>
                    </div>
                    <div class="form-group">
                        <label for="complement">Complemento</label>
                        <input type="text" id="complement" name="complement" th:field="*{complement}"
                            placeholder="Apt, Casa, Sala...">
                    </div>
                </div>

                <div class="form-group">
                    <label for="neighborhood">Bairro *</label>
                    <input type="text" id="neighborhood" name="neighborhood" th:field="*{neighborhood}" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="city">Cidade *</label>
                        <input type="text" id="city" name="city" th:field="*{city}" required>
                    </div>
                    <div class="form-group">
                        <label for="state">Estado *</label>
                        <input type="text" id="state" name="state" th:field="*{state}" placeholder="SP" maxlength="2"
                            required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="zipCode">CEP *</label>
                    <input type="text" id="zipCode" name="zipCode" th:field="*{zipCode}" placeholder="12345-678"
                        required>
                    <span class="form-hint">Formato: 12345-678</span>
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" th:field="*{isDefault}">
                        Definir como endereço padrão
                    </label>
                    <span class="form-hint">Se marcado, este endereço será o padrão da conta.</span>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">Atualizar Endereço</button>
                    <a th:href="@{/addresses}" class="btn-cancel">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
