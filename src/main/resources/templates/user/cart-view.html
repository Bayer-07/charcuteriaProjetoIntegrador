<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos | Koch Charcutaria</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/cart.css}" />
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <script th:src="@{/js/address/addressModal.js}" defer></script>
    <script th:src="@{/js/cart/ship.js}" defer></script>
    <script th:src="@{/js/cart/updateQuantity.js}" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="shortcut icon" th:href="@{/images/logo.png}" type="image/x-icon">
</head>

<body>
    <header class="main-header ">
        <div class="header-container">
            <div class="logo">
                <span class="brand-name">Koch</span>
                <span class="brand-suffix">Charcutaria</span>
            </div>
            <nav class="nav-menu">
                <ul>
                    <li><a th:href="@{/}">Início</a></li>
                    <li><a th:href="@{/produtos}">Catálogo</a></li>
                    <li><a th:href="@{/subscriptions}">Assinaturas</a></li>
                    <li><a th:href="@{/partners}">Parcerias</a></li>
                </ul>
            </nav>
            <div class="header-icons">
                <a href="/cart" class="icon-link">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="9" cy="21" r="1"></circle><circle cx="21" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                </a>
                <a href="/handleProfile" class="icon-link">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </a>
            </div>
        </div>
    </header>

    <main class="cart-container">
        <div th:if="${errorMessage}" class="error-message" style="color: red; margin-bottom: 1rem;" th:text="${errorMessage}"></div>

        <h1 class="cart-title">Carrinho</h1>

        <div class="cart-content">
            <section class="cart-items">
                <div th:each="item : ${cartItems}" class="cart-item-card">
                    <img th:src="${'/uploads/products/' + item.productFile}" alt="Produto" class="item-img">
                    <div class="item-details">
                        <h3 th:text="${item.productName}">Copa Lombo Defumada</h3>
                        <p class="item-price" th:text="${'R$ ' + #numbers.formatDecimal(item.unitPrice, 1, 'POINT', 2, 'COMMA')}"></p>
                        <div class="quantity-control">
                            <button class="qty-btn" th:onclick="|updateQty(${item.id}, -1)|">-</button>
                            <span th:id="'qty-' + ${item.id}" class="qty-value" th:text="${item.quantity}">1</span>
                            <button class="qty-btn" th:onclick="|updateQty(${item.id}, 1)|">+</button>
                        </div>
                    </div>
                    <div class="item-actions">
                        <p th:id="'price-' + ${item.id}" class="item-subtotal" th:attr="data-unit-price=${item.unitPrice}" th:text="${'R$ ' + #numbers.formatDecimal(item.subtotal, 1, 'POINT', 2, 'COMMA')}"></p>
                        <form th:action="@{/cart/delete/{id}(id=${item.id})}" method="post">
                            <button class="delete-btn" type="submit">
                                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </form>
                    </div>
                </div>
            </section>

            <aside class="cart-summary">
                <div class="summary-card">
                    <h2>Resumo</h2>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span class="summary-subtotal" th:text="${'R$ ' + #numbers.formatDecimal(totalCart, 1, 'POINT', 2, 'COMMA')}"></span>
                    </div>

                    <div class="address-section">
                        <div th:if="${#lists.isEmpty(addresses)}" class="address-empty">
                            Você ainda não cadastrou nenhum endereço.
                            <div style="margin-top:12px;">
                                <button type="button" id="openAddressModal" class="btn-add-address">Adicionar endereço</button>
                            </div>
                        </div>
                    </div>

                    <div th:if="${!#lists.isEmpty(cartItems)}" class="shipping-section">
                        <label for="shippingAddressSelect">Endereço para calcular frete</label>
                        <div th:if="${!#lists.isEmpty(addresses)}" class="shipping-input-group">
                            <select id="shippingAddressSelect" class="shipping-select" onchange="syncSelectedAddressZip()">
                                <option th:each="address : ${addresses}" th:value="${address.id}" th:data-zip="${address.zipCode}" th:selected="${address.isDefault}" th:text="${address.street + ', ' + address.number + ' - ' + address.city + ' | CEP ' + address.zipCode}"></option>
                            </select>
                            <input type="hidden" id="selectedAddressZip" th:value="${addresses[0].zipCode}">
                            <button type="button" onclick="calculateShipping()" class="btn-calculate">Calcular</button>
                            <button type="button" id="openAddressModal" class="btn-add-address-icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg></button>
                        </div>
                        <p id="shippingResult" class="shipping-result"></p>
                    </div>

                    <hr class="divider">

                    <div class="summary-row">
                        <span>Total Final</span>
                        <span class="total-value" th:text="${'R$ ' + #numbers.formatDecimal(totalCart, 1, 'POINT', 2, 'COMMA')}"></span>
                    </div>

                    <form th:action="@{/purchases/checkout}" method="post" onsubmit="prepareCheckout(event)">
                        <input type="hidden" id="checkoutAddressId" name="addressId" value="" required>
                        <button type="submit" class="btn-checkout" th:disabled="${#lists.isEmpty(cartItems) or #lists.isEmpty(addresses)}">
                            Finalizar Compra
                        </button>
                    </form>
                </div>
            </aside>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <script>
        function prepareCheckout(event) {
            const addressSelect = document.getElementById('shippingAddressSelect');
            if (!addressSelect || !addressSelect.value) {
                event.preventDefault();
                alert('Por favor, selecione um endereço de entrega válido.');
                return;
            }
            document.getElementById('checkoutAddressId').value = addressSelect.value;
        }
    </script>
</body>
</html>
