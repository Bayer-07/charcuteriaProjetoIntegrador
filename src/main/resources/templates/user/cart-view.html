<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos | Koch Charcutaria</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/cart.css}" href="/css/cart.css" />
    <link rel="stylesheet" th:href="@{/css/header.css}" href="/css/header.css" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" href="/css/footer.css" />
    <script th:src="@{/js/cart/ship.js}" defer></script>
    <script th:src="@{/js/cart/updateQuantity.js}" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <link rel="shortcut icon" th:href="@{/images/logo.png}" href="/images/logo.png" type="image/x-icon">
</head>

<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <span class="brand-name">Koch</span>
                <span class="brand-suffix">Charcutaria</span>
            </div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="/">Início</a></li>
                    <li><a href="produtos">Catálogo</a></li>
                    <li><a href="assinaturas">Assinaturas</a></li>
                    <li><a href="parcerias">Parcerias</a></li>
                </ul>
            </nav>
            <div class="header-icons">
                <a href="/cart" class="icon-link active">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="21" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                </a>
                <a href="/handleProfile" class="icon-link">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </a>
            </div>
        </div>
    </header>

    <main class="cart-container">
        <h1 class="cart-title">Carrinho</h1>

        <div class="cart-content">
            <section class="cart-items">
                <div th:each="item : ${cartItems}" class="cart-item-card">
                    <img th:src="${'/uploads/products/' + item.productFile}" alt="Produto" class="item-img">

                    <div class="item-details">
                        <h3 th:text="${item.productName}">Copa Lombo Defumada</h3>
                        <p class="item-price" th:text="${'R$ ' + item.unitPrice}">R$ 67,90</p>

                        <div class="quantity-control">
                            <button class="qty-btn" th:onclick="|updateQty(${item.id}, -1)|">-</button>
                            <span class="qty-value" th:text="${item.quantity}">1</span>
                            <button class="qty-btn" th:onclick="|updateQty(${item.id}, 1)|">+</button>
                        </div>
                    </div>

                    <div class="item-actions">
                        <p class="item-subtotal" th:text="${'R$ ' + item.subtotal}">R$ 67,90</p>
                        <form th:action="@{/cart/delete/{id}(id=${item.id})}" method="post">
                            <button class="delete-btn" type="submit">
                                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path
                                        d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                                    </path>
                                </svg>
                            </button>
                        </form>
                    </div>
                </div>
            </section>

            <aside class="cart-summary">
                <div class="summary-card">
                    <h2>Resumo</h2>

                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span th:text="${'R$ ' + totalCart}">R$ 67,90</span>
                    </div>

                    <div class="shipping-section">
                        <label for="cepInput">Calcular Frete</label>
                        <div class="shipping-input-group">
                            <input type="text" id="cepInput" placeholder="00000-000" maxlength="9">
                            <button type="button" onclick="calculateShipping()" class="btn-calculate">Calcular</button>
                        </div>
                        <p id="shippingResult" class="shipping-result"></p>
                    </div>

                    <hr class="divider">

                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span class="total-value" th:text="${'R$ ' + totalCart}">R$ 67,90</span>
                    </div>

                    <button class="btn-checkout">Finalizar Compra</button>
                </div>
            </aside>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>

</html>
