<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}" href="/css/sidebar.css" />
    <link rel="stylesheet" th:href="@{/css/modal.css}" href="/css/modal.css" />
    <link rel="stylesheet" th:href="@{/css/products.css}" href="/css/products.css" />
    <script th:src="@{/js/products.js}"></script>
    <link rel="shortcut icon" th:href="@{/images/logo.png}" href="/images/logo.png" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos | Koch Charcutaria</title>
</head>
<body>
    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <span class="brand-name">Koch</span>
            <span class="brand-admin">Admin</span>
        </div>

        <nav class="sidebar-nav">
            <ul>
                <li>
                    <a href="/admin/dashboard">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="active">
                    <a href="/admin/products">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 8V20a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8"></path><rect x="1" y="3" width="22" height="5"></rect><line x1="10" y1="12" x2="14" y2="12"></line></svg>
                        <span>Produtos</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/pedidos">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                        <span>Pedidos</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/assinaturas">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><rect x="2" y="5" width="20" height="14" rx="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>
                        <span>Assinaturas</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <a href="/logout" class="logout-link">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                <span>Sair</span>
            </a>
        </div>
    </aside>

    <main class="dashboard-content">
        <header class="content-header">
            <h1>Produtos</h1>
            <a href="/admin/produtos/novo" class="btn-new-product">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                Novo Produto
            </a>
        </header>

        <div class="table-container">
            <table class="products-table">
                <thead>
                    <tr>
                        <th class="col-id">ID</th>
                        <th class="col-name">Nome</th>
                        <th class="col-category">Categoria</th>
                        <th class="col-price">Preço</th>
                        <th class="col-actions">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products}">
                        <td class="cell-id" th:text="${product.id}"></td>
                        <td class="cell-name" th:text="${product.name}"></td>
                        <td class="cell-category">
                            <span th:text="${product.category}"></span>
                        </td>
                        <td class="cell-price" th:text="${'R' + #numbers.formatCurrency(product.price)}"></td>
                        <td class="cell-actions">
                            <a th:href="@{/admin/produtos/editar/{id}(id=${product.id})}" class="action-btn edit">
                                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4L18.5 2.5z"></path></svg>
                            </a>

                            <button type="button" class="action-btn delete" th:onclick="|openModal('${product.id}')|">
                                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <div id="deleteModal" class="modal-overlay">
        <div class="modal-card">
            <h2>Deseja Excluir</h2>
            <p>Deseja realmente excluir esse produto?<br>
            <span>Essa ação é irreversível</span>
            </p>

            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
                <form id="deleteForm" method="post">
                    <button type="submit" class="btn-confirm">Confirmar</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
