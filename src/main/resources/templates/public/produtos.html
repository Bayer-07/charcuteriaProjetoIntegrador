<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos | Koch Charcutaria</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styleProdutos.css}" href="/css/styleProdutos.css" />
    <link rel="stylesheet" th:href="@{/css/header.css}" href="/css/header.css" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" href="/css/footer.css" />
    <link rel="shortcut icon" th:href="@{/images/logo.png}" href="/images/logo.png" type="image/x-icon">
</head>

<body>
    <header class="main-header">
        <div class="header-container">
            <a class="logo icon-link" href="/">
                <span class="brand-name">Koch</span>
                <span class="brand-suffix">Charcutaria</span>
            </a>
            <nav class="nav-menu">
                <ul>
                    <nav class="nav-menu">
                        <ul>
                            <li><a th:href="@{/}">Início</a></li>
                            <li><a th:href="@{/produtos}" class="active">Catálogo</a></li>
                            <li><a th:href="@{/subscriptions}">Assinaturas</a></li>
                            <li><a th:href="@{/partners}">Parcerias</a></li>
                        </ul>
                    </nav>
                </ul>
            </nav>
            <div class="header-icons">
                <a href="/cart" class="icon-link">
                    <svg viewBox="0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="21" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                </a>
                <a href="/handleProfile" class="icon-link">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </a>
            </div>
        </div>
    </header>

    <main class="wrapper">
        <div class="products-container">
            <h1>Catálogo de Produtos</h1>

            <!-- Barra de Busca -->
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Buscar produtos..." class="search-input">
            </div>

            <!-- Filtros de Categorias -->
            <div class="filters-section">
                <button class="filter-btn active" data-filter="todos">Todos</button>
                <button class="filter-btn" data-filter="embutidos">Embutidos</button>
                <button class="filter-btn" data-filter="defumados">Defumados</button>
                <button class="filter-btn" data-filter="queijos">Queijos</button>
                <button class="filter-btn" data-filter="kits">Kits</button>
            </div>

            <!-- Grid de Produtos -->
            <div class="products-grid" th:if="${products != null and products.size() > 0}">
                <div class="product-card" th:each="product : ${products}"
                    th:data-category="${product.categoryName.toLowerCase()}">
                    <div class="product-image">
                        <img th:src="@{'/uploads/products/' + ${product.imagePath}}" src="/images/placeholder.png"
                            th:alt="${product.name}" alt="Produto">
                    </div>
                    <div class="product-info">
                        <h3 class="product-name" th:text="${product.name}">Nome do Produto</h3>
                        <p class="product-description" th:text="${product.description}">Descrição do produto</p>
                        <div class="product-footer">
                            <span class="product-price"
                                th:text="'R$ ' + ${#numbers.formatDecimal(product.price, 1, 2)}">R$ 0,00</span>
                            <form th:action="@{/cart/add}" method="post">
                                <input type="hidden" name="productId" th:value="${product.id}" />
                                <button type="submit" class="btn-add-cart">
                                    Adicionar
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <div class="empty-state" th:if="${products == null or products.size() == 0}">
                <p>Nenhum produto disponível no momento.</p>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <script src="/js/products/catalogo.js"></script>
</body>

</html>
