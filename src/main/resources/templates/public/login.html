<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Koch Charcutaria</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styleLogin.css}" href="/css/styleLogin.css" />
    <link rel="stylesheet" th:href="@{/css/header.css}" href="/css/header.css" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" href="/css/footer.css" />
    <link rel="shortcut icon" th:href="@{/images/logo.png}" href="/images/logo.png" type="image/x-icon">
</head>

<body>
    <header class="main-header">
        <div class="header-container">
            <a class="logo icon-link" href="/">
                <span class="brand-name">Koch</span>
                <span class="brand-suffix">Charcutaria</span>
            </a>
            <nav class="nav-menu">
                <ul>
                    <nav class="nav-menu">
                        <ul>
                            <li><a th:href="@{/}">Início</a></li>
                            <li><a th:href="@{/produtos}">Catálogo</a></li>
                            <li><a th:href="@{/subscriptions}">Assinaturas</a></li>
                            <li><a th:href="@{/partners}">Parcerias</a></li>
                        </ul>
                    </nav>
                </ul>
            </nav>
            <div class="header-icons">
                <a href="/cart" class="icon-link">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="21" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                </a>
                <a href="/handleProfile" class="icon-link">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </a>
            </div>
        </div>
    </header>

    <div th:if="${param.error}" id="toast-error" class="toast-error">
        <p>Usuário ou senha inválidos.</p>
    </div>

    <main class="login-wrapper">
        <div class="card-login">
            <div class="logo-wrapper">
                <img th:src="@{/images/logo.png}" src="/images/logo.png" alt="Logo Charcuteria" class="circular-logo">
            </div>

            <h1 class="login-title">Login</h1>
            <p class="subtitle">Preencha os campos abaixo para acessar sua conta</p>

            <form class="form-login" th:action="@{/login}" th:object="${userDto}" method="post">
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" th:field="*{email}" placeholder="nome@nome.com.br" required>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" th:field="*{password}" placeholder="********" required>
                </div>
                <div th:if="${loginError}" id="toast-error" class="toast-error" th:text="${loginError}"></div>
                <button class="btn-login" type="submit">Entrar</button>
            </form>
            <div class="card-footer">
                <p>Não tem uma conta? <a href="/register" class="bold-link">Crie Uma</a></p>
                <a href="/loginAdmin" class="admin-link">Entrar como administrador</a>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <script th:src="@{/js/login/loginToast.js}"></script>
</body>

</html>
